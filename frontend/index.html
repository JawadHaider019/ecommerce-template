<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- ✅ FIREFOX FIX: Add compatibility meta -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- ✅ CRITICAL: Favicon Setup -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#000000">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ✅ CRITICAL: SEO Meta Tags for Indexing -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://pureclay.org/">
    
    <!-- ✅ Google Search Console Meta Tag Verification -->
    <meta name="google-site-verification" content="c0876b0e7a2b01c2" />
    
    <!-- Meta Description -->
    <meta name="description" content="Pure Clay - Pakistan's No. 1 organic brand for premium olive oil, peanuts, dates & natural foods. 100% pure, chemical-free products trusted nationwide." />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Pure Clay - Pakistan's Leading Organic Foods Brand | Olive Oil & Natural Products">
    <meta property="og:description" content="Pakistan's No. 1 organic brand for premium olive oil, peanuts, dates & natural foods. 100% pure, chemical-free products trusted nationwide.">
    <meta property="og:url" content="https://pureclay.org">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://pureclay.org/logo.png">
    <meta property="og:site_name" content="Pure Clay">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pure Clay - Pakistan's Leading Organic Foods Brand">
    <meta name="twitter:description" content="Pakistan's No. 1 organic brand for premium olive oil, peanuts, dates & natural foods">
    <meta name="twitter:image" content="https://pureclay.org/logo.png">
    
    <title>Pure Clay - Pakistan's Leading Organic Foods Brand | Olive Oil & Natural Products</title>

    <!-- ✅ Critical CSS Inline with Firefox fixes -->
    <style>
      /* Critical above-the-fold styles */
      #root {
        min-height: 100vh;
        display: block; /* Firefox fix */
      }
      
      /* Skeleton loading states - Firefox optimized */
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        /* Firefox animation prefix */
        -moz-animation: loading 1.5s infinite;
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Firefox-specific keyframes */
      @-moz-keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Ensure content is visible immediately - Firefox fix */
      .critical-visible {
        opacity: 1 !important;
        visibility: visible !important;
        display: block !important; /* Firefox fix */
      }
      
      /* Basic layout to prevent CLS - Firefox compatible */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #ffffff;
        color: #000000;
        /* Ensure body is visible in Firefox */
        display: block;
        opacity: 1;
      }
      
      /* Firefox flexbox fallback */
      .flex {
        display: -webkit-box;
        display: -moz-box;
        display: -ms-flexbox;
        display: -webkit-flex;
        display: flex;
      }
      
      /* Firefox grid fallback */
      .grid {
        display: -moz-grid;
        display: -ms-grid;
        display: grid;
      }
    </style>

    <!-- ✅ Preconnect to important origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- ✅ DNS-prefetch for external domains -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <!-- ✅ Enhanced Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Pure Clay",
      "url": "https://pureclay.org",
      "logo": "https://pureclay.org/logo.png",
      "description": "Pakistan's leading organic brand for premium olive oil, peanuts, dates and natural foods",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PK"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["en", "ur"]
      },
      "sameAs": [
        "https://www.facebook.com/pureclay",
        "https://www.instagram.com/pureclay",
        "https://www.tiktok.com/@pureclay"
      ]
    }
    </script>
  </head>
  <body>
    <!-- ✅ Skeleton screen for immediate visual feedback -->
    <div id="root">
      <div style="min-height: 100vh; display: flex; flex-direction: column; opacity: 1; visibility: visible;">
        <!-- Header skeleton -->
        <div style="height: 70px; background: #f8f9fa; border-bottom: 1px solid #e9ecef;" class="skeleton"></div>
        
        <!-- Hero skeleton -->
        <div style="flex: 1; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <div style="width: 200px; height: 60px; background: #e9ecef; margin-bottom: 2rem; border-radius: 8px;" class="skeleton"></div>
          <div style="width: 300px; height: 20px; background: #e9ecef; margin-bottom: 1rem; border-radius: 4px;" class="skeleton"></div>
          <div style="width: 150px; height: 50px; background: #e9ecef; border-radius: 8px;" class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- ✅ FIXED: Remove /src/index.css loading - Vite handles this automatically -->
    <script>
      // Firefox detection
      const isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
      
      // Add Firefox class to body for CSS targeting
      if (isFirefox) {
        document.body.classList.add('firefox');
        document.documentElement.classList.add('firefox');
      }
      
      // Remove skeleton when app loads - Firefox optimized
      window.addEventListener('DOMContentLoaded', function() {
        const root = document.getElementById('root');
        const skeleton = root?.firstChild;
        
        if (skeleton) {
          // Give React a moment to render
          setTimeout(function() {
            // Check if React has rendered content
            if (root && root.children.length > 1) {
              skeleton.style.opacity = '0';
              skeleton.style.transition = 'opacity 0.3s ease';
              
              setTimeout(function() {
                if (skeleton.parentNode) {
                  skeleton.parentNode.removeChild(skeleton);
                }
              }, 300);
            }
          }, 500);
        }
      });
      
      // Emergency fallback: Force remove skeleton after 3 seconds
      setTimeout(function() {
        const root = document.getElementById('root');
        const skeleton = root?.firstChild;
        if (skeleton && skeleton.tagName === 'DIV' && skeleton.className.includes('skeleton')) {
          skeleton.style.display = 'none';
        }
      }, 3000);
    </script>
    
    <!-- ✅ Load main script with Firefox compatibility -->
    <script type="module" src="/src/main.jsx" defer></script>
    
    <!-- ✅ Firefox-specific noscript fallback -->
    <noscript>
      <div style="padding: 2rem; text-align: center;">
        <h2>JavaScript is required to run this application.</h2>
        <p>Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
  </body>
</html>
